arch = {
    packages = [
        # display manager
        "ly",

        # input
        "fcitx5",

        # hypr-suite
        "hyprland",
        "hypridle",
        "hyprlock",
        "hyprpicker",
        "hyprsunset",
        "hyprpolkitagent",
        "uwsm",
        "app2unit",

        # waybar
        "waybar",
        "kdeconnect",
        "wiremix",
        "bluetui",
        "impala",
        "bluez-utils",
        "dualsensectl-git",
        "waybar-module-pacman-updates-git",

        # screensharing
        "xdg-desktop-portal-hyprland",
        "xdg-desktop-portal-gtk",

        # required utilities
        "walker",
        {
            name = "elephant",
            hooks = {
                after_install = [
                    "elephant",
                    "service",
                    "enable"
                ]
            }
        },
        "elephant-desktopapplications",
        "elephant-providerlist",
        "elephant-calc",
        "elephant-symbols",
        "elephant-websearch",
        "elephant-clipboard",
        "elephant-runner",
        "elephant-menus",
        "openbsd-netcat",
        "awww",
        "grim",
        "slurp",
        "swappy",
        "wl-clipboard",
        "wtype",
        "brightnessctl",
        "playerctl",
        "dunst",

        # optional deps
        "cpio",
        "xorg-xwayland",

        # fonts
        "ttf-jetbrains-mono-nerd",
        "gnu-free-fonts",
        "noto-fonts-emoji",
        "noto-fonts-cjk",
        "ttf-ms-fonts",
        "inter-font",

        # themeing
        "nwg-look",
        "papirus-icon-theme",
        "papirus-folders",
        "qt6ct-kde",
        "breeze",
        "gnome-themes-extra",
        "spicetify-cli",
        "spicetify-marketplace-bin",
    ]
}
