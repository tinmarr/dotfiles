###################
# Hyprland Config #
###################

# Startup
exec-once = hyprctl setcursor oreo_purple_cursors 32
exec-once = uwsm app -- fcitx5 -kr
exec-once = QT_QPA_PLATFORM=xcb uwsm app -- /usr/bin/kdeconnectd
exec-once = uwsm app -- kdeconnect-indicator
exec-once = uwsm app -- playerctld daemon
exec-once = uwsm app -- ~/.config/hypr/sunsetctl.sh
exec-once = uwsm app -- bat-notif
exec-once = uwsm app -- awww-daemon
exec-once = uwsm app -- awww-randomize
exec-once = uwsm app -- walker --gapplication-service

##### Monitors #####
# https://wiki.hypr.land/Configuring/Monitors/
# Home config
monitor=desc:LG Electronics LG HDR 4K 0x00048B3D, 3840x2160@60, 0x0, 1.5
# Laptop
monitor=eDP-1, preferred, auto, 1.33
# Work screens
monitor=desc:LG Electronics LG ULTRAGEAR 508BNPS1H816, preferred, auto-up, 1
# All other screens
monitor=, preferred, auto-right, 1

#### Variables ####
$mainMod = SUPER

#### Theme ####
source = ~/.config/hypr/colors.conf

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 5
    gaps_out = 10
    border_size = 2

    layout = scrolling

    no_focus_fallback = true

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    snap {
        enabled = true
        border_overlap = true
        respect_gaps = true
    }

    resize_on_border = true
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 5

    blur {
        enabled = true
        size = 16
        passes = 4
        contrast = 1.5
        vibrancy = 1
        vibrancy_darkness = 1
        brightness = 1
    }

    shadow {
        enabled = true
        range = 4
        render_power = 1
    }
}

animations {
    enabled = true

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = compose:ralt
    kb_rules =

    follow_mouse = 2
    accel_profile = flat
    float_switch_override_focus = 2
    mouse_refocus = false

    touchpad {
        natural_scroll = true
    }

    scroll_factor = 1.1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    emulate_discrete_scroll = 0
}

device {
    # Framework 13 Touchpad
    name = pixa3854:00-093a:0274-touchpad
    accel_profile = adaptive
}

gestures {
    workspace_swipe_distance = 200
    workspace_swipe_cancel_ratio = 0
    workspace_swipe_min_speed_to_force = 0
    workspace_swipe_direction_lock = false
    workspace_swipe_direction_lock_threshold = 1000
}

gesture = 3, horizontal, workspace

group {
    groupbar {
        height = 0
        indicator_height = 8
        render_titles = false
        rounding = 5
        round_only_edges = false
        blur = true
        gaps_out = 4
        gaps_in = 4
        keep_upper_gap = false
    }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vrr = 1
    force_default_wallpaper = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    enable_swallow = true
    swallow_regex = ^(com.mitchellh.ghostty)$
    allow_session_lock_restore = true
    font_family = JetBrainsMono Nerd Font Mono
    screencopy_force_8b = true
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile =  false
    force_split = 2
    preserve_split = true
    split_bias = 1
}

scrolling {
    fullscreen_on_one_column = true
    focus_fit_method = 1
    explicit_column_widths = 0.25, 0.333, 0.5, 0.667, 0.75, 1
}

xwayland {
    force_zero_scaling = true
    create_abstract_socket = true
}

opengl {
    nvidia_anti_flicker = true
}

render {
    direct_scanout = 2 # 0 - off, 1 - on, 2 - auto (on with content type ‘game’)
    ctm_animation = 1 # ctm == hyprsunset
    cm_fs_passthrough = 2 # Passthrough color settings for fullscreen apps when possible. 0 - off, 1 - always, 2 - hdr only
    cm_auto_hdr = 2 # Auto-switch to HDR in fullscreen when needed. 0 - off, 1 - switch to cm, hdr, 2 - switch to cm, hdredid
    new_render_scheduling = true
}

cursor {
    no_hardware_cursors = 2
    no_warps = true
    hide_on_key_press = true
    hide_on_touch = true
    use_cpu_buffer = true
    default_monitor = DP-1
}

ecosystem {
    enforce_permissions = true
}

quirks {
    prefer_hdr = 2
}

debug {
    disable_logs = false
}

#### Permissions ####
# https://wiki.hypr.land/Configuring/Permissions/
# these do not hotreload
# permission = regex, permission, mode
permission = /usr/bin/hyprlock, screencopy, allow
permission = /usr/bin/hyprpicker, screencopy, allow
permission = /usr/bin/grim, screencopy, allow
permission = /usr/lib/xdg-desktop-portal-hyprland, screencopy, allow

permission = /usr/bin/hyprpm, plugin, allow

#### Keybindings ####
# Movement
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d
bind = $mainMod ALT, l, focusmonitor, -1
bind = $mainMod ALT, h, focusmonitor, 1
bind = ALT, TAB, focuscurrentorlast

# Window behavior
bind = $mainMod SHIFT, f, togglefloating
bind = $mainMod, f, fullscreen
bind = $mainMod, m, layoutmsg, fit active
bind = $mainMod, v, layoutmsg, togglesplit
bind = $mainMod, i, layoutmsg, colresize +conf
bind = $mainMod, u, layoutmsg, colresize -conf
bind = $mainMod, p, pseudo

# Moving windows
bind = $mainMod SHIFT, h, movewindoworgroup, l
bind = $mainMod SHIFT, l, movewindoworgroup, r
bind = $mainMod SHIFT, k, movewindoworgroup, u
bind = $mainMod SHIFT, j, movewindoworgroup, d

# Changing split ratio
bind = $mainMod CONTROL, l, resizeactive, 100 0
bind = $mainMod CONTROL, h, resizeactive, -100 0
bind = $mainMod CONTROL, j, resizeactive, 0 100
bind = $mainMod CONTROL, k, resizeactive, 0 -100

# Moving workspaces
bind = $mainMod CONTROL ALT, l, moveworkspacetomonitor, +0 -1
bind = $mainMod CONTROL ALT, h, moveworkspacetomonitor, +0 1

# Groups
bind = $mainMod SHIFT, g, togglegroup
bind = $mainMod, g, changegroupactive

# Workspace switching
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# System controls
bind = , XF86MonBrightnessUp, exec, brightnessctl s +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl s 5%-
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioNext, exec, playerctl next

# Hyprland Management
bind = $mainMod, q, killactive
bind = $mainMod ALT, q, forcekillactive
bind = $mainMod SHIFT, r, exec, ~/.config/hypr/reload.sh
bind = $mainMod SHIFT, w, exec, pidof hyprlock || hyprlock
bind = $mainMod, s, toggleswallow

# App start shortcuts
bind = $mainMod, return, exec, ghostty +new-window
bind = $mainMod, Print, exec, pkill hyprpicker || uwsm-app -- hyprpicker -a
bind = , Print, exec, uwsm-app -- ~/.config/hypr/screenshot
bind = SHIFT, Print, exec, uwsm-app -- ~/.config/hypr/screenshot --freeze
bind = $mainMod SHIFT, return, global, com.mitchellh.ghostty:SHIFT+LOGO+Return

# Runner
bind = $mainMod, r, exec, nc -U /run/user/1000/walker/walker.sock
bind = $mainMod ALT, w, exec, walker-kill
bind = $mainMod, comma, exec, elephant menu system-control

# Open popups
bind = $mainMod, o, submap, open
submap = open, reset
bind = , a, exec, ghostty +new-window --title='-float-' -e /usr/bin/wiremix
bind = , b, exec, ghostty +new-window --title='-float-' -e /usr/bin/bluetui
bind = , w, exec, ghostty +new-window --title='-float-' -e /usr/bin/impala
bind = , catchall, submap, reset
submap = reset

# Notification Submap
bind = $mainMod, n, submap, notif
submap = notif, reset
bind = , c, exec, dunstctl close-all
bind = , p, exec, dunstctl set-paused toggle
bind = , x, exec, dunstctl history-clear
bind = , a, exec, dunstctl action 0
bind = , 1, exec, dunstctl action 0
bind = , 2, exec, dunstctl action 1
bind = , 3, exec, dunstctl action 2
bind = , 4, exec, dunstctl action 3
bind = , 5, exec, dunstctl action 4
bind = , 6, exec, dunstctl action 5
bind = , 7, exec, dunstctl action 6
bind = , 8, exec, dunstctl action 7
bind = , 9, exec, dunstctl action 8
bind = , 0, exec, dunstctl action 9
bind = , catchall, submap, reset
submap = reset

#### Mouse Bindings ####
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#### Lid Switch ####
bindl=,switch:Lid Switch, exec, ~/.config/hypr/switch.sh

#### Window rules ####
windowrule {
    name = slack-to-4
    workspace = 4 silent
    match:class = Slack
}

windowrule {
    name = spotify-to-10
    workspace = 10 silent
    match:title = ^(Spotify Premium)$
}

windowrule {
    name = float-and-position-notifications
    float = on
    move = (min(max((monitor_w*1),0),monitor_w-window_w)) (min(max(-(monitor_h*1),0),monitor_h-window_h))
    no_initial_focus = on
    match:class = ^()$
}

windowrule {
    name = proper-pip
    float = on
    pin = on
    match:title = ^(Picture-in-Picture)$
}

windowrule {
    name = special-floating-title
    float = on
    pin = on
    stay_focused = on
    dim_around = on
    match:title = .*\-float\-.*
}

windowrule {
    name = float-popups
    float = on
    match:class = ^(hyprland-share-picker|xdg-desktop-portal-gtk)$
}

windowrule {
    name = allow-tearing-for-steam
    immediate = on
    match:initial_class = ^(steam_app.*)$
}

layerrule {
    name = disable-walker-animations
    no_anim = on
    blur = on
    ignore_alpha = 0
    match:namespace = walker
}

layerrule {
    name = disable-screenshot-animations
    no_anim = on
    match:namespace = selection
}
